<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twibbon & Caption MPLS SMKS Tunas Harapan</title>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f0f4f8;
      color: #333;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    header {
      text-align: center;
      margin-bottom: 25px;
    }

    header h1 {
      color: #2563eb;
      font-size: 22px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    header p {
      font-size: 14px;
      color: #64748b;
    }

    .step-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1e293b;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      background-color: #fff;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      background: #fff;
      border: 2px dashed #cbd5e1;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Bagian Logo dan Judul di atas Canvas */
    .canvas-header {
      text-align: center;
      margin-bottom: 15px;
    }

    .canvas-header img {
      width: 60px;
      height: auto;
      margin-bottom: 8px;
    }

    .canvas-header h3 {
      font-size: 16px;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .canvas-header p {
      font-size: 12px;
      color: #64748b;
    }

    .canvas-container {
      width: 100%;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      overflow: hidden;
      background-color: #e2e8f0;
      position: relative;
      margin-bottom: 15px;
    }

    canvas {
      width: 100%;
      height: auto;
      cursor: grab;
      display: block;
      touch-action: none; /* Mencegah layar scroll saat mencubit canvas */
    }

    canvas:active {
      cursor: grabbing;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .controls label {
      font-size: 14px;
      font-weight: 600;
    }

    input[type="range"] {
      flex: 1;
      cursor: pointer;
    }

    .btn-zoom {
      width: 35px;
      height: 35px;
      border: none;
      border-radius: 6px;
      background-color: #e2e8f0;
      color: #333;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-zoom:hover {
      background-color: #cbd5e1;
    }

    .caption-box {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 10px;
      color: #334155;
      text-align: left;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary { background-color: #2563eb; color: white; }
    .btn-primary:hover { background-color: #1d4ed8; }
    .btn-success { background-color: #16a34a; color: white; }
    .btn-success:hover { background-color: #15803d; }
    .btn-secondary { background-color: #64748b; color: white; font-size: 14px; padding: 8px; }
    .btn-secondary:hover { background-color: #475569; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>MPLS SMKS TUNAS HARAPAN</h1>
      <p>Buat Twibbon dan Ambil Caption Resmi Kamu di Sini!</p>
    </header>

    <div id="page-form">
      <div class="step-box">
        <div class="form-group">
          <label for="input-nama">Nama Lengkap</label>
          <input type="text" id="input-nama" placeholder="Contoh: Ahmad Fauzi" required>
        </div>

        <div class="form-group">
          <label for="input-sekolah">Sekolah Asal</label>
          <input type="text" id="input-sekolah" placeholder="Contoh: SMPN 1 Jakarta" required>
        </div>

        <div class="form-group">
          <label for="input-jurusan">Pilih Jurusan</label>
          <select id="input-jurusan">
            <option value="TEKNIK KENDARAAN RINGAN">TEKNIK KENDARAAN RINGAN</option>
            <option value="TEKNIK KOMPUTER DAN JARINGAN">TEKNIK KOMPUTER DAN JARINGAN</option>
            <option value="MANAJEMEN PERKANTORAN">MANAJEMEN PERKANTORAN</option>
          </select>
        </div>

        <div class="form-group">
          <label for="upload-input">Pilih Foto Terbaikmu</label>
          <input type="file" id="upload-input" accept="image/*" required>
        </div>
      </div>

      <button id="btn-lanjut" class="btn-primary btn">Lanjut Selesaikan Twibbon ➔</button>
    </div>

    <div id="page-editor" class="hidden">
      <div class="step-box">
        
        <div class="canvas-header">
          <img src="media/logo.png" alt="Logo SMKS Tunas Harapan" onerror="this.style.display='none'">
          <h3>Area Editor Twibbon</h3>
          <p>💡 Tip: Geser foto dengan satu jari. Cubit layar dengan dua jari atau gunakan tombol untuk memperbesar/memperkecil foto.</p>
        </div>
        
        <div class="canvas-container">
          <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
          <label for="zoom-slider">Zoom:</label>
          <button id="btn-zoom-out" class="btn-zoom">-</button>
          <input type="range" id="zoom-slider" min="0.1" max="3" step="0.05" value="1">
          <button id="btn-zoom-in" class="btn-zoom">+</button>
        </div>
      </div>

      <button id="download-btn" class="btn-primary btn">➔ Download Twibbon (PNG)</button>
      
      <div class="step-box" style="margin-top: 15px;">
        <h3 style="font-size: 15px; margin-bottom: 8px;">Caption Media Sosial Kamu:</h3>
        <div id="caption-preview" class="caption-box"></div>
        <button id="copy-btn" class="btn-success btn">📋 Salin Teks Caption</button>
      </div>

      <button id="btn-kembali" class="btn-secondary btn">⬅ Kembali / Ubah Data</button>
    </div>
  </div>

  <script type="module">
    const pageForm = document.getElementById('page-form');
    const pageEditor = document.getElementById('page-editor');
    const btnLanjut = document.getElementById('btn-lanjut');
    const btnKembali = document.getElementById('btn-kembali');
    
    const inputNama = document.getElementById('input-nama');
    const inputSekolah = document.getElementById('input-sekolah');
    const inputJurusan = document.getElementById('input-jurusan');
    const uploadInput = document.getElementById('upload-input');

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const zoomSlider = document.getElementById('zoom-slider');
    const btnZoomIn = document.getElementById('btn-zoom-in');
    const btnZoomOut = document.getElementById('btn-zoom-out');
    const downloadBtn = document.getElementById('download-btn');
    const captionPreview = document.getElementById('caption-preview');
    const copyBtn = document.getElementById('copy-btn');

    const frameImage = new Image();
    const userImage = new Image();
    let isUserImageLoaded = false;
    
    let userX = 0;
    let userY = 0;
    let userScale = 1;
    
    let isDragging = false;
    let startX, startY;

    let initialPinchDistance = null;
    let initialScale = 1;
    let finalCaptionText = "";

    frameImage.src = 'media/frame.png';
    frameImage.onload = () => {
      canvas.width = frameImage.width || 1080;
      canvas.height = frameImage.height || 1080;
      draw();
    };

    btnLanjut.addEventListener('click', () => {
      if (!inputNama.value.trim() || !inputSekolah.value.trim() || !uploadInput.files[0]) {
        alert('Harap isi Nama, Sekolah Asal, dan pilih Foto terlebih dahulu!');
        return;
      }

      // PEMBARUAN: Penambahan Salam 6 Agama secara Sangat Lengkap & Akurat!
      finalCaptionText = `❗❗I'M READY FOR MPLS SMKS TUNAS HARAPAN❗❗

Assalamu'alaikum Warahmatullahi Wabarakatuh,
Salam Sejahtera bagi kita semua,
Shalom,
Om Swastiastu,
Namo Buddhaya,
Salam Kebajikan

Saya ${inputNama.value.trim()} dari ${inputSekolah.value.trim()} siap ikut serta dalam mengikuti seluruh rangkaian kegiatan Masa Perkenalan Lingkungan Sekolah Tahun 2026 dan menjadi bagian keluarga besar SMKS TUNAS HARAPAN dengan berfokus menekuni bidang ${inputJurusan.value}.

See you in MPLS fellows!

Jangan takut membuat kesalahan, karena kesalahan adalah bagian dari belajar.
@smkstunasharapan @osistunasharapanq`;

      captionPreview.innerText = finalCaptionText;
      pageForm.classList.add('hidden');
      pageEditor.classList.remove('hidden');
      draw();
    });

    btnKembali.addEventListener('click', () => {
      pageEditor.classList.add('hidden');
      pageForm.classList.remove('hidden');
    });

    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          userImage.src = event.target.result;
          userImage.onload = () => {
            isUserImageLoaded = true;
            userX = canvas.width / 2;
            userY = canvas.height / 2;
            
            const scaleWidth = canvas.width / userImage.width;
            const scaleHeight = canvas.height / userImage.height;
            userScale = Math.max(scaleWidth, scaleHeight);
            
            zoomSlider.min = Math.min(scaleWidth, scaleHeight) * 0.4;
            zoomSlider.max = userScale * 4;
            zoomSlider.value = userScale;
            draw();
          };
        };
        reader.readAsDataURL(file);
      }
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (isUserImageLoaded) {
        ctx.save();
        ctx.translate(userX, userY);
        ctx.scale(userScale, userScale);
        ctx.drawImage(userImage, -userImage.width / 2, -userImage.height / 2);
        ctx.restore();
      }

      if (frameImage.complete) {
        ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
      }
    }

    // --- KONTROL ZOOM (SLIDER & TOMBOL) ---
    zoomSlider.addEventListener('input', (e) => {
      userScale = parseFloat(e.target.value);
      draw();
    });

    btnZoomIn.addEventListener('click', () => {
      let currentScale = parseFloat(zoomSlider.value);
      let newScale = Math.min(parseFloat(zoomSlider.max), currentScale + 0.1);
      zoomSlider.value = newScale;
      userScale = newScale;
      draw();
    });

    btnZoomOut.addEventListener('click', () => {
      let currentScale = parseFloat(zoomSlider.value);
      let newScale = Math.max(parseFloat(zoomSlider.min), currentScale - 0.1);
      zoomSlider.value = newScale;
      userScale = newScale;
      draw();
    });

    // --- KONTROL GESER (MOUSE) ---
    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    canvas.addEventListener('mousedown', (e) => {
      if (!isUserImageLoaded) return;
      isDragging = true;
      const pos = getMousePos(e);
      startX = pos.x - userX;
      startY = pos.y - userY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const pos = getMousePos(e);
      userX = pos.x - startX;
      userY = pos.y - startY;
      draw();
    });

    canvas.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('mouseleave', () => isDragging = false);

    // --- KONTROL SENTUH (GESER 1 JARI & CUBIT 2 JARI) ---
    canvas.addEventListener('touchstart', (e) => {
      if (!isUserImageLoaded) return;
      
      if (e.touches.length === 1) {
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touchX = (e.touches[0].clientX - rect.left) * scaleX;
        const touchY = (e.touches[0].clientY - rect.top) * scaleY;
        startX = touchX - userX;
        startY = touchY - userY;
      } else if (e.touches.length === 2) {
        isDragging = false;
        initialPinchDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        initialScale = userScale;
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!isUserImageLoaded) return;
      e.preventDefault();

      if (e.touches.length === 1 && isDragging) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touchX = (e.touches[0].clientX - rect.left) * scaleX;
        const touchY = (e.touches[0].clientY - rect.top) * scaleY;
        
        userX = touchX - startX;
        userY = touchY - startY;
        draw();
      } else if (e.touches.length === 2 && initialPinchDistance) {
        const currentDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        
        const scaleChange = currentDistance / initialPinchDistance;
        let newScale = initialScale * scaleChange;
        
        newScale = Math.max(parseFloat(zoomSlider.min), Math.min(parseFloat(zoomSlider.max), newScale));
        
        userScale = newScale;
        zoomSlider.value = newScale;
        draw();
      }
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      if (e.touches.length < 2) {
        initialPinchDistance = null;
      }
      if (e.touches.length === 0) {
        isDragging = false;
      }
    });

    // --- DOWNLOAD & COPY ---
    downloadBtn.addEventListener('click', () => {
      const dataURL = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = `Twibbon_MPLS_${inputNama.value.replace(/\s+/g, '_')}.png`;
      link.href = dataURL;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    copyBtn.addEventListener('click', async () => {
      if (!finalCaptionText) return;
      try {
        await navigator.clipboard.writeText(finalCaptionText);
        alert('🎉 Sukses! Teks caption berhasil disalin ke clipboard!');
      } catch (err) {
        alert('Gagal menyalin teks otomatis, silakan blok dan salin manual teks di atas.');
      }
    });
  </script>
</body>
</html>
