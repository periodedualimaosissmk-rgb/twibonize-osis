<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twibbon & Caption MPLS SMKS Tunas Harapan</title>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #f0f4f8;
      color: #333;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    header {
      text-align: center;
      margin-bottom: 25px;
    }

    header h1 {
      color: #2563eb;
      font-size: 22px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    header p {
      font-size: 14px;
      color: #64748b;
    }

    .step-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1e293b;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
      background-color: #fff;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    input[type="file"] {
      width: 100%;
      padding: 10px;
      background: #fff;
      border: 2px dashed #cbd5e1;
      border-radius: 6px;
      cursor: pointer;
    }

    .canvas-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      overflow: hidden;
      background-color: #e2e8f0;
      position: relative;
      margin-bottom: 15px;
    }

    canvas {
      width: 100%;
      height: 100%;
      cursor: grab;
      display: block;
    }

    canvas:active {
      cursor: grabbing;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .controls label {
      font-size: 14px;
      font-weight: 600;
    }

    input[type="range"] {
      flex: 1;
      cursor: pointer;
    }

    /* Area Preview Caption */
    .caption-box {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      white-space: pre-wrap; /* Menjaga spasi/enter teks tetap rapi */
      max-height: 150px;
      overflow-y: auto;
      margin-bottom: 10px;
      color: #334155;
      text-align: left;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: #2563eb;
      color: white;
    }

    .btn-primary:hover {
      background-color: #1d4ed8;
    }

    .btn-success {
      background-color: #16a34a;
      color: white;
    }

    .btn-success:hover {
      background-color: #15803d;
    }

    .btn-secondary {
      background-color: #64748b;
      color: white;
      font-size: 14px;
      padding: 8px;
    }

    .btn-secondary:hover {
      background-color: #475569;
    }

    /* Menyembunyikan Halaman/Langkah secara dinamis */
    .hidden {
      display: none;
    }

    .hint {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>MPLS SMKS TUNAS HARAPAN</h1>
      <p>Buat Twibbon dan Ambil Caption Resmi Kamu di Sini!</p>
    </header>

    <div id="page-form">
      <div class="step-box">
        <div class="form-group">
          <label for="input-nama">Nama Lengkap</label>
          <input type="text" id="input-nama" placeholder="Contoh: Ahmad Fauzi" required>
        </div>

        <div class="form-group">
          <label for="input-sekolah">Sekolah Asal</label>
          <input type="text" id="input-sekolah" placeholder="Contoh: SMPN 1 Jakarta" required>
        </div>

        <div class="form-group">
          <label for="input-jurusan">Pilih Jurusan</label>
          <select id="input-jurusan">
            <option value="TEKNIK KENDARAAN RINGAN">TEKNIK KENDARAAN RINGAN</option>
            <option value="TEKNIK KOMPUTER DAN JARINGAN">TEKNIK KOMPUTER DAN JARINGAN</option>
            <option value="MANAJEMEN PERKANTORAN">MANAJEMEN PERKANTORAN</option>
          </select>
        </div>

        <div class="form-group">
          <label for="upload-input">Pilih Foto Terbaikmu</label>
          <input type="file" id="upload-input" accept="image/*" required>
        </div>
      </div>

      <button id="btn-lanjut" class="btn-primary btn">Lanjut Selesaikan Twibbon ➔</button>
    </div>

    <div id="page-editor" class="hidden">
      <div class="step-box">
        <h3 style="font-size: 16px; margin-bottom: 10px;">Atur Posisi Foto</h3>
        <p class="hint">💡 Tip: Geser foto langsung di dalam kotak dan gunakan slider untuk zoom.</p>
        
        <div class="canvas-container">
          <canvas id="canvas" width="1080" height="1080"></canvas>
        </div>

        <div class="controls">
          <label for="zoom-slider">Zoom:</label>
          <input type="range" id="zoom-slider" min="0.1" max="3" step="0.05" value="1">
        </div>
      </div>

      <button id="download-btn" class="btn-primary btn">➔ Download Twibbon (PNG)</button>
      
      <div class="step-box" style="margin-top: 15px;">
        <h3 style="font-size: 15px; margin-bottom: 8px;">Caption Media Sosial Kamu:</h3>
        <div id="caption-preview" class="caption-box"></div>
        <button id="copy-btn" class="btn-success btn">📋 Salin Teks Caption</button>
      </div>

      <button id="btn-kembali" class="btn-secondary btn">⬅ Kembali / Ubah Data</button>
    </div>
  </div>

  <script>
    // Deklarasi Elemen DOM Halaman & Input
    const pageForm = document.getElementById('page-form');
    const pageEditor = document.getElementById('page-editor');
    const btnLanjut = document.getElementById('btn-lanjut');
    const btnKembali = document.getElementById('btn-kembali');
    
    const inputNama = document.getElementById('input-nama');
    const inputSekolah = document.getElementById('input-sekolah');
    const inputJurusan = document.getElementById('input-jurusan');
    const uploadInput = document.getElementById('upload-input');

    // Deklarasi Elemen Canvas & Output
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const zoomSlider = document.getElementById('zoom-slider');
    const downloadBtn = document.getElementById('download-btn');
    const captionPreview = document.getElementById('caption-preview');
    const copyBtn = document.getElementById('copy-btn');

    // Variabel Gambar & Koordinat Foto
    let frameImage = new Image();
    let userImage = new Image();
    let isUserImageLoaded = false;
    let userX = canvas.width / 2;
    let userY = canvas.height / 2;
    let userScale = 1;
    let isDragging = false;
    let startX, startY;
    let finalCaptionText = ""; // Tempat menyimpan teks hasil generate

    // Memuat frame PNG manual dari folder 'media/'
    frameImage.src = 'media/frame.png';
    frameImage.onload = () => { draw(); };

    // 1. Logika tombol "Lanjut" (Validasi Form & Pindah Halaman)
    btnLanjut.addEventListener('click', () => {
      // Validasi apakah form sudah terisi semua
      if (!inputNama.value.trim() || !inputSekolah.value.trim() || !uploadInput.files[0]) {
        alert('Harap isi Nama, Sekolah Asal, dan pilih Foto terlebih dahulu!');
        return;
      }

      // Generate teks caption berdasarkan input data diri siswa
      finalCaptionText = `❗❗I'M READY FOR MPLS SMKS TUNAS HARAPAN❗❗

Assalamu'alaikum warahmatullahi wabarakatuh
Salam sejahtera bagi kita semua
Shalom
Om Swastiastu
Namo Buddhaya
Salam Kebajikan

Saya ${inputNama.value.trim()} dari ${inputSekolah.value.trim()} siap ikut serta dalam mengikuti seluruh rangkaian kegiatan Masa Perkenalan Lingkungan Sekolah Tahun 2025 dan menjadi bagian keluarga besar SMKS TUNAS HARAPAN dengan berfokus menekuni bidang ${inputJurusan.value}.

See you in MPLS fellows

Jangan takut membuat kesalahan, karena kesalahan adalah bagian dari belajar
@osistunasharapan @smkstunasharapan`;

      // Masukkan teks ke kotak pratinjau (preview)
      captionPreview.innerText = finalCaptionText;

      // Pindahkan tampilan dari Form ke Editor
      pageForm.classList.add('hidden');
      pageEditor.classList.remove('hidden');
      
      // Render ulang gambar pada canvas
      draw();
    });

    // 2. Logika tombol "Kembali"
    btnKembali.addEventListener('click', () => {
      pageEditor.classList.add('hidden');
      pageForm.classList.remove('hidden');
    });

    // 3. Logika Membaca File Foto yang diupload
    uploadInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          userImage.src = event.target.result;
          userImage.onload = () => {
            isUserImageLoaded = true;
            
            // Set posisi awal foto ke tengah canvas
            userX = canvas.width / 2;
            userY = canvas.height / 2;
            
            // Atur zoom awal agar pas dengan ukuran canvas kotak
            const scaleWidth = canvas.width / userImage.width;
            const scaleHeight = canvas.height / userImage.height;
            userScale = Math.max(scaleWidth, scaleHeight);
            
            zoomSlider.min = Math.min(scaleWidth, scaleHeight) * 0.4;
            zoomSlider.max = userScale * 3;
            zoomSlider.value = userScale;
          };
        };
        reader.readAsDataURL(file);
      }
    });

    // 4. Fungsi Utama: Menggambar ke Canvas
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Set latar belakang dasar putih
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Menggambar Foto Siswa
      if (isUserImageLoaded) {
        ctx.save();
        ctx.translate(userX, userY);
        ctx.scale(userScale, userScale);
        ctx.drawImage(userImage, -userImage.width / 2, -userImage.height / 2);
        ctx.restore();
      }

      // Menggambar Bingkai/Frame PNG di atas foto siswa
      if (frameImage.complete) {
        ctx.drawImage(frameImage, 0, 0, canvas.width, canvas.height);
      }
    }

    // 5. Kontrol Input Slider Zoom
    zoomSlider.addEventListener('input', (e) => {
      userScale = parseFloat(e.target.value);
      draw();
    });

    // 6. Fitur Menggeser Foto (Drag & Drop) via Mouse & Touch HP
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      if (e.touches && e.touches.length > 0) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top) * scaleY
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function startDrag(e) {
      if (!isUserImageLoaded) return;
      isDragging = true;
      const pos = getPos(e);
      startX = pos.x - userX;
      startY = pos.y - userY;
    }

    function drag(e) {
      if (!isDragging) return;
      e.preventDefault(); // Mencegah scrolling layar HP saat geser foto
      const pos = getPos(e);
      userX = pos.x - startX;
      userY = pos.y - startY;
      draw();
    }

    function stopDrag() { isDragging = false; }

    canvas.addEventListener('mousedown', startDrag);
    canvas.addEventListener('mousemove', drag);
    canvas.addEventListener('mouseup', stopDrag);
    canvas.addEventListener('mouseleave', stopDrag);

    canvas.addEventListener('touchstart', startDrag);
    canvas.addEventListener('touchmove', drag);
    canvas.addEventListener('touchend', stopDrag);

    // 7. Fungsi Tombol Unduh / Download Twibbon
    downloadBtn.addEventListener('click', () => {
      const dataURL = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = `Twibbon_MPLS_${inputNama.value.replace(/\s+/g, '_')}.png`;
      link.href = dataURL;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    // 8. Fungsi Tombol Salin / Copy Teks Caption Otomatis
    copyBtn.addEventListener('click', () => {
      if (!finalCaptionText) return;
      
      // Menggunakan API Clipboard bawaan browser modern
      navigator.clipboard.writeText(finalCaptionText).then(() => {
        alert('🎉 Sukses! Teks caption berhasil disalin ke clipboard HP/Laptop kamu. Tinggal paste saat upload!');
      }).catch(err => {
        alert('Gagal menyalin teks otomatis, silakan blok dan salin manual teks di atas.');
      });
    });
  </script>
</body>
</html>
